<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Plan Architect</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>

    <div class="ui-panel" id="main-panel">
        <h2>Design Tools</h2>
        
        <div class="tool-section">
            <h3>Mode</h3>
            <button id="draw-wall-btn" class="active-tool">Draw Wall</button>
            <button id="select-btn">Select / Move</button>
        </div>

        <div class="tool-section">
            <h3>Fixtures (Arch)</h3>
            <button id="add-door-btn">Add Door</button>
            <button id="add-window-btn">Add Window</button>
        </div>

        <div class="tool-section">
            <h3>Systems</h3>
            <button id="add-outlet-btn">Add Outlet (Elec)</button>
            <button id="add-pipe-btn">Add Pipe (Plumb)</button>
        </div>

        <div class="tool-section">
            <h3>Layers</h3>
            <label><input type="checkbox" checked id="layer-arch"> Architecture</label>
            <label><input type="checkbox" checked id="layer-elec"> Electrical</label>
            <label><input type="checkbox" checked id="layer-plumb"> Plumbing</label>
        </div>
        
        <button id="clear-btn" class="danger-btn" style="width: 100%; margin-top: 10px;">Clear Canvas</button>
    </div>

    <div class="ui-panel script-panel">
        <h2>Automation Script</h2>
        <div class="tool-section">
            <textarea id="script-input" rows="6" placeholder="wall 100 100 400 100&#10;door 250 100&#10;outlet 250 150"></textarea>
            <button id="run-script-btn" style="background: #34c759; color: white; border-color: #34c759;">Run Script</button>
        </div>
    </div>

    <canvas id="main-canvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
